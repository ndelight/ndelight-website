<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop NDelight Water | Bulk Orders</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/logo.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body { background: radial-gradient(circle at top, #0b1020 0, #050509 55%, #020308 100%); color: #e5e7eb; }
        .shop-wrap { max-width: 1200px; margin: 6.5rem auto 2rem; padding: 0 1rem; display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 1.2rem; }
        .shop-main, .side { background: rgba(15, 23, 42, 0.92); border: 1px solid rgba(148, 163, 184, 0.45); border-radius: 16px; box-shadow: 0 18px 40px rgba(2, 6, 23, 0.7); }
        .shop-main { padding: 1rem; }
        .title { font-size: 1.5rem; margin: 0 0 .35rem; color: #f8fafc; }
        .sub { color: #cbd5e1; font-size: .9rem; margin-bottom: 1rem; }
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; }
        .product { border: 1px solid rgba(148, 163, 184, 0.35); border-radius: 12px; padding: .8rem; display: flex; flex-direction: column; gap: .6rem; background: rgba(2, 6, 23, 0.55); }
        .product img { width: 100%; aspect-ratio: 1/1; object-fit: contain; background: rgba(15, 23, 42, 0.9); border-radius: 10px; border: 1px solid rgba(148, 163, 184, 0.35); }
        .product h3 { margin: 0; font-size: 1rem; color: #f8fafc; }
        .price { color: #7dd3fc; font-weight: 700; font-size: .95rem; }
        .bulk-buttons { display: flex; gap: .4rem; flex-wrap: wrap; }
        .bulk-btn { border: 1px solid rgba(148, 163, 184, 0.7); border-radius: 999px; padding: .3rem .65rem; background: transparent; color: #e5e7eb; font-size: .78rem; cursor: pointer; }
        .bulk-btn.active { background: #0ea5e9; color: #fff; border-color: #0ea5e9; }
        .custom-row { display: flex; gap: .5rem; align-items: center; color: #cbd5e1; }
        .custom-row input { width: 110px; padding: .45rem; border: 1px solid rgba(148, 163, 184, 0.6); border-radius: 8px; background: #0b1020; color: #f8fafc; }
        .action-row { display: flex; gap: .5rem; }
        .btn { border: none; border-radius: 8px; padding: .55rem .7rem; cursor: pointer; font-size: .84rem; font-weight: 600; }
        .btn-cart { background: #f59e0b; color: #111827; }
        .btn-buy { background: #2563eb; color: #fff; }
        .side { padding: 1rem; position: sticky; top: 88px; height: fit-content; }
        .cart-list { max-height: 260px; overflow-y: auto; border: 1px solid rgba(148, 163, 184, 0.45); border-radius: 8px; padding: .6rem; margin-bottom: .8rem; background: rgba(2, 6, 23, 0.5); }
        .cart-empty { color: #94a3b8; font-size: .85rem; }
        .cart-item { display: grid; grid-template-columns: 1fr auto; gap: .4rem; font-size: .83rem; padding: .45rem 0; border-bottom: 1px dashed rgba(148, 163, 184, 0.35); }
        .cart-item-actions { display: flex; gap: .3rem; align-items: center; }
        .cart-mini-btn { border: 1px solid rgba(148, 163, 184, 0.6); background: transparent; color: #e2e8f0; border-radius: 6px; padding: .15rem .42rem; cursor: pointer; font-size: .75rem; }
        .total { font-weight: 700; margin: .7rem 0; color: #f8fafc; }
        .checkout .form-group { margin-bottom: .6rem; }
        .checkout label { font-size: .78rem; color: #cbd5e1; display: block; margin-bottom: .2rem; }
        .checkout input, .checkout textarea { width: 100%; padding: .55rem; border: 1px solid rgba(148, 163, 184, 0.6); border-radius: 8px; font-size: .84rem; background: #0b1020; color: #f8fafc; }
        .pay-btn { width: 100%; background: linear-gradient(135deg,#0284c7,#1d4ed8); color: #fff; border: none; border-radius: 9px; padding: .7rem; cursor: pointer; font-weight: 700; margin-top: .6rem; }
        @media (max-width: 980px){ .shop-wrap{ grid-template-columns: 1fr; } .side{ position: static; } }
    </style>
</head>

<body>
    <header class="header">
        <div class="container header-container">
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="/water.html#about-water" class="nav-link">About</a></li>
                    <li><a href="/water-order.html" class="nav-link">Order</a></li>
                    <li><a href="/water.html#design" class="nav-link">Design</a></li>
                </ul>
            </nav>

            <a href="/" class="brand-logo">
                <div class="brand-text">
                    <span class="brand-title">NDelight</span>
                    <span class="brand-subtitle">Water</span>
                </div>
            </a>

            <div class="header-cta">
                <a href="/" class="nav-link" style="margin-right: 1.5rem;">Back to Home</a>
                <button class="menu-toggle">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <main class="shop-wrap">
        <section class="shop-main">
            <h1 class="title">NDelight Water Bulk Shop</h1>
            <p class="sub">Choose bottle size, select bulk quantity (100/200/500 or custom), then Add to Cart or Buy Now.</p>
            <div class="products" id="water-products"></div>
        </section>
        <aside class="side">
            <h3 style="margin-top:0;">Cart & Checkout</h3>
            <div class="cart-list" id="cart-list"><div class="cart-empty">No items in cart.</div></div>
            <div class="total">Total: ₹<span id="cart-total">0</span></div>
            <form id="water-checkout-form" class="checkout">
                <div class="form-group"><label for="water-name">Name</label><input id="water-name" required placeholder="Your full name"></div>
                <div class="form-group"><label for="water-phone">Phone</label><input id="water-phone" required placeholder="+91..."></div>
                <div class="form-group"><label for="water-email">Email (optional)</label><input id="water-email" type="email" placeholder="name@email.com"></div>
                <div class="form-group"><label for="water-address">Address</label><textarea id="water-address" rows="2" required></textarea></div>
                <button type="submit" id="checkout-btn" class="pay-btn">Proceed to Payment</button>
            </form>
        </aside>
    </main>

    <script type="module" src="/water-order.js"></script>
    <script type="module" src="/main.js"></script>
    <script>
        // Keep the same header behavior as /water:
        // hide on scroll down, show on scroll up/top.
        (function () {
            const header = document.querySelector('.header');
            if (!header) return;

            let lastScrollY = window.scrollY;

            window.addEventListener('scroll', () => {
                const currentScrollY = window.scrollY;

                if (currentScrollY > lastScrollY && currentScrollY > 80) {
                    header.classList.add('hidden');
                } else {
                    header.classList.remove('hidden');
                }

                lastScrollY = currentScrollY;
            });
        })();
    </script>
</body>

</html>
